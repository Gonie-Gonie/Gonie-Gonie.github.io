<!doctype html>
<html lang="en" data-lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Personal research and software website.">
  <meta name="theme-color" content="#f7f8f5">
  <title>Research & Software</title>
  <link rel="stylesheet" href="app/assets/css/styles.css">
  <script defer src="app/assets/js/data.js"></script>
  <script defer src="app/assets/js/app.js"></script>
</head>
<body>
  <a class="skip-link" href="#main" data-i18n="skip">Skip to content</a>

  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html" aria-label="Home">
        <span class="brand-copy">
          <strong data-profile="name"></strong>
          <small data-i18n="brandRole">Research · simulation · software</small>
        </span>
      </a>

      <nav class="primary-nav" aria-label="Primary">
        <a href="#projects" data-page-link="projects" data-i18n="navProjects">Projects</a>
        <a href="#publications" data-page-link="publications" data-i18n="navPublications">Publications</a>
        <a href="#software" data-page-link="software" data-i18n="navSoftware">Software</a>
        <a href="#notes" data-page-link="notes" data-i18n="navNotes">Notes & photos</a>
      </nav>

      <div class="header-controls">
        <a class="header-cv-link" href="cv.html">CV</a>
        <div class="language-switch" role="group" aria-label="Language">
          <button type="button" data-lang-switch="en" aria-pressed="true">EN</button>
          <span aria-hidden="true">/</span>
          <button type="button" data-lang-switch="ko" aria-pressed="false">KR</button>
        </div>
      </div>
    </div>
  </header>

  <main id="main">
    <section class="section-shell section-tinted" data-page-section="home">
      <div class="container">
        <div class="about-grid">
          <aside class="profile-card">
            <img id="profile-photo" alt="" width="709" height="992" loading="lazy">
            <video id="profile-video" controls playsinline preload="metadata" hidden></video>
            <div class="profile-card-heading">
              <h3 data-profile="name"></h3>
              <span id="profile-card-title" class="profile-card-title"></span>
            </div>
            <ul id="profile-card-credentials" class="profile-card-credentials"></ul>
            <p data-profile="affiliation"></p>
            <div id="contact-links" class="contact-links"></div>
          </aside>

          <div class="about-content">
            <section class="profile-intro">
              <h1>
                <span data-profile="name"></span>
                <span class="profile-intro-role" data-profile="role"></span>
              </h1>
              <p class="profile-intro-text" data-profile="intro-short"></p>
              <dl id="profile-stats" class="profile-stats" aria-label="Profile statistics"></dl>
            </section>
            <section class="about-block">
              <h3 data-i18n="experienceTitle">Experience</h3>
              <div id="experience-list" class="timeline"></div>
            </section>
            <section class="about-block">
              <h3 data-i18n="educationTitle">Education</h3>
              <div id="education-list" class="timeline"></div>
            </section>
            <section class="about-block">
              <h3 data-i18n="certificationsTitle">Certifications</h3>
              <div id="certifications-list" class="timeline compact-timeline"></div>
            </section>
            <section class="about-block">
              <h3 data-i18n="awardsTitle">Awards</h3>
              <div id="awards-list" class="timeline compact-timeline"></div>
            </section>
            <section class="about-block">
              <h3 data-i18n="teachingTitle">Teaching</h3>
              <div id="teaching-list" class="timeline compact-timeline"></div>
            </section>
            <section class="about-block">
              <h3 data-i18n="scholarshipsTitle">Scholarships</h3>
              <div id="scholarships-list" class="timeline"></div>
            </section>
            <section class="about-block">
              <h3 data-i18n="skillsTitle">Technical Skills</h3>
              <div id="skills-list" class="skills-list"></div>
            </section>
          </div>
        </div>
      </div>
    </section>

    <section id="projects" class="section-shell section-page" data-page-section="projects" hidden>
      <div class="container">
        <div id="projects-timeline" class="project-roadmap" aria-live="polite"></div>
        <div id="projects-grid" class="card-grid project-grid" aria-live="polite"></div>
      </div>
    </section>

    <section id="publications" class="section-shell section-page" data-page-section="publications" hidden>
      <div class="container">
        <div class="publication-toolbar" aria-label="Publication controls">
          <input id="pub-search" type="search" autocomplete="off" placeholder="Search: title, author, journal, conference…" aria-label="Search" data-i18n-placeholder="searchPlaceholder" data-i18n-aria="searchLabel">
          <select id="pub-type" aria-label="Publication type" data-i18n-aria="typeLabel"></select>
          <select id="pub-topic" aria-label="Publication topic" data-i18n-aria="topicLabel"></select>
          <button id="pub-reset" class="publication-reset" type="button" aria-label="Reset filters" title="Reset filters" data-i18n-aria="resetFilters" data-i18n-title="resetFilters">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 11a8 8 0 1 0-2.34 5.66M20 4v7h-7"></path>
            </svg>
          </button>
        </div>

        <div id="publication-collaborators" class="publication-collaborators" aria-label="Collaborators" data-i18n-aria="collaborators"></div>

        <div class="publication-actions">
          <div class="result-summary">
            <strong id="pub-result-count">0</strong>
            <span data-i18n="results">results</span>
          </div>
          <div class="publication-options">
            <label class="publication-checkbox">
              <input id="pub-first-author" type="checkbox">
              <span data-i18n="firstAuthorOnly">First author</span>
            </label>
            <div class="publication-sort">
              <div class="sort-toggle" role="group" aria-label="Publication sort">
                <button type="button" data-pub-sort="newest" class="is-active" aria-pressed="true" data-i18n="sortNewest">Newest first</button>
                <button type="button" data-pub-sort="type" aria-pressed="false" data-i18n="sortType">By type</button>
                <button type="button" data-pub-sort="topic" aria-pressed="false" data-i18n="sortTopic">By topic</button>
              </div>
            </div>
          </div>
        </div>

        <div id="publication-list" class="publication-list" aria-live="polite"></div>
        <p id="publications-empty" class="empty-state" hidden data-i18n="noPublications">No publications match the current filters.</p>
      </div>
    </section>

    <section id="software" class="section-shell section-page section-tinted" data-page-section="software" hidden>
      <div class="container">
        <div id="software-grid" class="card-grid software-grid" aria-live="polite"></div>
      </div>
    </section>

    <section id="notes" class="section-shell section-page" data-page-section="notes" hidden>
      <div class="container">
        <div id="notes-grid" class="notes-feed" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <dialog id="media-lightbox" class="media-lightbox" aria-labelledby="lightbox-caption">
    <div class="lightbox-shell">
      <button type="button" class="lightbox-close" data-lightbox-close data-i18n-aria="closeMedia" aria-label="Close media viewer">×</button>
      <button type="button" class="lightbox-nav lightbox-prev" data-lightbox-prev data-i18n-aria="previousMedia" aria-label="Previous media">
        <span aria-hidden="true">←</span>
      </button>
      <figure class="lightbox-figure">
        <img id="lightbox-image" src="" alt="">
        <video id="lightbox-video" controls playsinline preload="metadata" hidden></video>
        <figcaption id="lightbox-caption"></figcaption>
      </figure>
      <button type="button" class="lightbox-nav lightbox-next" data-lightbox-next data-i18n-aria="nextMedia" aria-label="Next media">
        <span aria-hidden="true">→</span>
      </button>
      <div id="lightbox-count" class="lightbox-count" aria-live="polite"></div>
    </div>
  </dialog>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <noscript>
    <div class="noscript">JavaScript is required to view this page.</div>
  </noscript>
</body>
</html>
